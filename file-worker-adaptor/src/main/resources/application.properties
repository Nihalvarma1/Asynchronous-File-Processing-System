spring.application.name=file-worker-adaptor
server.port=8082

#Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/file_processing
spring.datasource.username=root
spring.datasource.password=root
spring.jpa.hibernate.ddl-auto=update

#Logs Configuration
logging.base.path=C:/Users/Nihal Varma/Desktop/My Projects/logs
track.name=Asynchronous-File-Processing-System
interface.name=file-worker-adaptor
logging.config=classpath:logback-spring.xml
logging.file.name=${logging.base.path}/${track.name}/${interface.name}/${interface.name}.log
logging.level.root=info
logging.level.com.myproject=TRACE
logging.level.com.zaxxer.hikari.pool.HikariPool=INFO
logging.level.org.springframework.ws.client=TRACE

# Kafka Consumer Configuration
spring.kafka.consumer.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=file-upload-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.use.type.headers=false
spring.kafka.consumer.properties.spring.json.value.default.type=com.myproject.file_management.file_worker_adaptor.dto.FileEventDto


